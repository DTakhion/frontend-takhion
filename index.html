<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite + React + TS</title>
  </head>
  <body>
    <div id="root"></div>

    <!-- 🔹 React Refresh preamble (fix for @vitejs/plugin-react-swc) -->
    <script type="module">
      import RefreshRuntime from "/@react-refresh";
      RefreshRuntime.injectIntoGlobalHook(window);
      window.$RefreshReg$ = () => {};
      window.$RefreshSig$ = () => (type) => type;
      window.__vite_plugin_react_preamble_installed__ = true;
    </script>

    <!-- 🔹 Carga principal de tu app -->
    <script type="module" src="/src/main.tsx"></script>

    <!-- 🔹 Watson Assistant (Phidel) -->
    <script>
      window.watsonAssistantChatOptions = {
        integrationID: "795098bf-98b5-44f0-bfdf-418dbfe264fd",
        region: "wxo-us-south",
        serviceInstanceID: "c4d6df8c-5e05-4c5f-8c6a-24a2d86e9c8a",
        orchestrateUIAgentExtensions: false,
        onLoad: async (instance) => { await instance.render(); }
      };
      setTimeout(function(){
        const t = document.createElement('script');
        t.src =
          "https://web-chat.global.assistant.watson.appdomain.cloud/versions/" +
          (window.watsonAssistantChatOptions.clientVersion || "latest") +
          "/WatsonAssistantChatEntry.js";
        t.id = "watson-web-chat";
        document.head.appendChild(t);
      });
    </script>
  </body>
</html>
